apiVersion: v1
kind: ConfigMap
metadata:
  name: heimdall-config
  namespace: unkey
  labels:
    app: heimdall
data:
  unkey.toml: |
    region = "local"
    platform = "dev"
    clickhouse_url = "clickhouse://default:password@clickhouse:9000?secure=false&skip_verify=true"
    collection_interval = "15s"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: heimdall
  namespace: unkey
  labels:
    app: heimdall
spec:
  replicas: 1
  selector:
    matchLabels:
      app: heimdall
  template:
    metadata:
      labels:
        app: heimdall
    spec:
      serviceAccountName: unkey-serviceaccount
      containers:
        - name: heimdall
          image: unkey/go:latest
          args: ["run", "heimdall", "--config", "/etc/unkey/unkey.toml"]
          imagePullPolicy: Never
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 50m
              memory: 64Mi
          volumeMounts:
            - name: config
              mountPath: /etc/unkey
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: heimdall-config
