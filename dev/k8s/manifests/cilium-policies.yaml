# Cilium Cluster-Wide Network Policies
# These policies enforce network isolation for customer workloads
# Customer pods are identified by labels (managed-by: krane, component: deployment)
# and spawn in custom namespaces on nodes with node-class: untrusted
#
# NOTE: Default deny for customer pods is handled implicitly - when krane creates
# a CiliumNetworkPolicy in the customer namespace, Cilium automatically enables
# default deny for the selected endpoints. We don't need an explicit deny-all policy.
---
# 1. Allow gossip traffic between API pods
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: api-gossip-lan
  namespace: unkey
spec:
  endpointSelector:
    matchLabels:
      app: api
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: api
      toPorts:
        - ports:
            - port: "7946"
              protocol: TCP
            - port: "7946"
              protocol: UDP
---
# 1b. Allow gossip traffic between Frontline pods
apiVersion: cilium.io/v2
kind: CiliumNetworkPolicy
metadata:
  name: frontline-gossip-lan
  namespace: frontline
spec:
  endpointSelector:
    matchLabels:
      app: frontline
  ingress:
    - fromEndpoints:
        - matchLabels:
            app: frontline
      toPorts:
        - ports:
            - port: "7946"
              protocol: TCP
            - port: "7946"
              protocol: UDP
---
# 2. Block K8s API server access from customer pods
# Prevents customer workloads from accessing the Kubernetes API
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: customer-deny-kube-apiserver
spec:
  description: "Prevent customer pods from reaching K8s API server"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: krane
      app.kubernetes.io/component: deployment
  egressDeny:
    - toEntities:
        - kube-apiserver
---
# 3. Allow DNS and internet egress from customer pods
# Customer pods can resolve DNS and reach external internet
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: customer-allow-egress
spec:
  description: "Allow customer pods to reach DNS, external internet, and Krane for secret decryption"
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: krane
      app.kubernetes.io/component: deployment
  egress:
    # DNS resolution via kube-dns
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    # Krane for secret decryption (DecryptSecretsBlob RPC)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: unkey
            app: krane
      toPorts:
        - ports:
            - port: "8070"
              protocol: TCP
    # External internet access
    - toEntities:
        - world
---
# 3b. Allow unkey namespace to reach krane-managed deployment pods directly.
# LOCAL DEV ONLY: in production ctrl-worker fetches specs via the public FQDN
# (HTTPS through frontline) and never contacts deployment pods directly.
# Here, *.unkey.local FQDNs are not publicly routable, so ctrl-worker falls
# back to plain HTTP directly to the pod IP and this policy permits that
# traffic. Customer ingress from frontline runs on a separate per-deployment
# CNP that krane installs in each namespace.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-unkey-to-deployments
spec:
  endpointSelector:
    matchLabels:
      app.kubernetes.io/managed-by: krane
      app.kubernetes.io/component: deployment
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: unkey
---
# 4. Legacy: allow frontline (and unkey, for older code paths) to reach
# sentinels. Customer traffic now bypasses sentinel — frontline talks
# directly to deployment instances via the per-deployment CNP krane installs
# in each namespace. This rule stays until sentinel is deleted entirely so
# any straggler sentinel-bound calls don't break in dev.
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-frontline-to-sentinel
spec:
  description: "Allow frontline/unkey namespace to reach any sentinel pod"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: sentinel
      app.kubernetes.io/component: sentinel
  ingress:
    - fromEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: unkey
        - matchLabels:
            io.kubernetes.pod.namespace: frontline
      toPorts:
        - ports:
            - port: "8040"
              protocol: TCP
---
# 5b. Allow sentinel egress to MySQL and ClickHouse
# Sentinels need database access for routing and state management
apiVersion: cilium.io/v2
kind: CiliumClusterwideNetworkPolicy
metadata:
  name: allow-sentinel-egress
spec:
  description: "Allow sentinel pods to reach MySQL and resolve DNS"
  endpointSelector:
    matchLabels:
      io.kubernetes.pod.namespace: sentinel
      app.kubernetes.io/component: sentinel
  egress:
    # DNS resolution via kube-dns
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: kube-system
            k8s-app: kube-dns
      toPorts:
        - ports:
            - port: "53"
              protocol: ANY
    # Gossip between sentinel pods
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: sentinel
            app.kubernetes.io/component: sentinel
      toPorts:
        - ports:
            - port: "7946"
              protocol: TCP
            - port: "7946"
              protocol: UDP
    # MySQL in unkey namespace
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: unkey
            app: mysql
      toPorts:
        - ports:
            - port: "3306"
              protocol: TCP
    # ClickHouse in unkey namespace (HTTP and native protocols)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: unkey
            app: clickhouse
      toPorts:
        - ports:
            - port: "8123"
              protocol: TCP
            - port: "9000"
              protocol: TCP
    # Redis in unkey namespace (rate limiting, usage limiting)
    - toEndpoints:
        - matchLabels:
            io.kubernetes.pod.namespace: unkey
            app: redis
      toPorts:
        - ports:
            - port: "6379"
              protocol: TCP
