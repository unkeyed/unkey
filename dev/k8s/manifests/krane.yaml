apiVersion: v1
kind: ConfigMap
metadata:
  name: krane-config
  namespace: unkey
  labels:
    app: krane
    component: krane
data:
  unkey.toml: |
    region = "local"
    platform = "dev"

    [control]
    url = "http://ctrl-api:7091"
    token = "your-local-dev-key"

    [vault]
    url = "http://vault:8060"
    token = "vault-test-token-123"

    [registry]
    url = "registry.depot.dev"
    username = "x-token"
    password = "${UNKEY_REGISTRY_PASSWORD}"

---
apiVersion: v1
kind: Service
metadata:
  name: krane
  namespace: unkey
  labels:
    app: krane
    component: krane
spec:
  selector:
    app: krane
  ports:
    - port: 8070
      targetPort: 8070
      protocol: TCP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: krane
  namespace: unkey
  labels:
    app: krane
    component: krane
spec:
  replicas: 1
  selector:
    matchLabels:
      app: krane
  template:
    metadata:
      labels:
        app: krane
        component: krane
    spec:
      serviceAccountName: unkey-serviceaccount
      containers:
        - name: krane
          image: unkey/go:latest
          args: ["run", "krane", "--config", "/etc/unkey/unkey.toml"]
          imagePullPolicy: Never # Use local images
          env:
            - name: UNKEY_REGISTRY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: depot-credentials
                  key: UNKEY_DEPOT_TOKEN
                  optional: true
          ports:
            - containerPort: 8070
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 8070
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 8070
            initialDelaySeconds: 10
            periodSeconds: 10
          volumeMounts:
            - name: config
              mountPath: /etc/unkey
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: krane-config
