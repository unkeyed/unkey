---
apiVersion: v1
kind: ConfigMap
metadata:
  name: frontline-config
  namespace: frontline
data:
  unkey.toml: |
    platform = "dev"
    region = "local"
    http_port = 7070
    https_port = 7443
    apex_domain = "unkey.local"
    ctrl_addr = "http://ctrl-api.unkey.svc.cluster.local:7091"

    [database]
    primary = "unkey:password@tcp(mysql.unkey.svc.cluster.local:3306)/unkey?parseTime=true&interpolateParams=true"

    [redis]
    url = "redis://default:password@redis.unkey.svc.cluster.local:6379"

    [clickhouse]
    url = "clickhouse://default:password@clickhouse.unkey.svc.cluster.local:9000?secure=false&skip_verify=true"

    [tls]
    cert_file = "/certs/unkey.local.crt"
    key_file = "/certs/unkey.local.key"

    [gossip]
    lan_port = 7946
    lan_seeds = ["frontline-gossip-lan"]
    secret_key = "dGhpcy1pcy1hLWRldi1vbmx5LWdvc3NpcC1rZXkh"

    [vault]
    url = "http://vault.unkey.svc.cluster.local:8060"
    token = "vault-test-token-123"

    [pprof]
    username = "admin"
    password = "password"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontline
  namespace: frontline
  labels:
    app: frontline
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontline
  template:
    metadata:
      labels:
        app: frontline
    spec:
      containers:
        - name: frontline
          image: unkey/go:latest
          args: ["run", "frontline", "--config", "/etc/unkey/unkey.toml"]
          imagePullPolicy: Never
          ports:
            - containerPort: 7070
              name: http
            - containerPort: 7443
              name: https
            - containerPort: 7946
              name: gossip-lan
              protocol: TCP
            - containerPort: 7946
              name: gossip-lan-udp
              protocol: UDP
          volumeMounts:
            - name: config
              mountPath: /etc/unkey
              readOnly: true
            - name: tls-certs
              mountPath: /certs
              readOnly: true
          readinessProbe:
            httpGet:
              path: /_unkey/internal/health/ready
              port: 7070
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /_unkey/internal/health/live
              port: 7070
            initialDelaySeconds: 10
            periodSeconds: 10
      volumes:
        - name: config
          configMap:
            name: frontline-config
        - name: tls-certs
          configMap:
            name: frontline-certs
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36
          command:
            [
              "sh",
              "-c",
              "until nc -z mysql.unkey.svc.cluster.local 3306 && nc -z ctrl-api.unkey.svc.cluster.local 7091 && nc -z vault.unkey.svc.cluster.local 8060; do sleep 2; done",
            ]
---
apiVersion: v1
kind: Service
metadata:
  name: frontline
  namespace: frontline
spec:
  selector:
    app: frontline
  ports:
    - name: http
      port: 80
      targetPort: 7070
    - name: https
      port: 443
      targetPort: 7443
  type: LoadBalancer

---
apiVersion: v1
kind: Service
metadata:
  name: frontline-gossip-lan
  namespace: frontline
spec:
  clusterIP: None
  selector:
    app: frontline
  ports:
    - name: gossip-lan
      port: 7946
      targetPort: 7946
      protocol: TCP
    - name: gossip-lan-udp
      port: 7946
      targetPort: 7946
      protocol: UDP
