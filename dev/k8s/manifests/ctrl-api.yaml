---
apiVersion: v1
kind: ConfigMap
metadata:
  name: ctrl-api-config
  namespace: unkey
  labels:
    app: ctrl-api
data:
  unkey.toml: |
    instance_id = "ctrl-api-dev"
    region = "local"
    http_port = 7091
    auth_token = "your-local-dev-key"
    default_domain = "unkey.local"
    cname_domain = "unkey.local"

    [database]
    primary = "unkey:password@tcp(mysql:3306)/unkey?parseTime=true&interpolateParams=true"

    [restate]
    url = "http://restate:8080"
    admin_url = "http://restate:9070"

    [clickhouse]
    # Used by ReportInstanceEvents to absorb container lifecycle events from
    # krane into instance_events_raw_v1. Without this URL the buffer falls
    # back to a noop and the dashboard's events panel stays empty.
    url = "clickhouse://default:password@clickhouse:9000?secure=false&skip_verify=true"

    [domain_connect]
    private_key_pem = """${UNKEY_DOMAIN_CONNECT_PRIVATE_KEY}"""

    [github]
    webhook_secret = "${UNKEY_GITHUB_APP_WEBHOOK_SECRET}"
    app_id = ${UNKEY_GITHUB_APP_ID}
    private_key_pem = """${UNKEY_GITHUB_PRIVATE_KEY_PEM}"""

    # Stripe webhook for the month-end Deploy billing close. Both come from the
    # optional stripe-credentials secret (dev/.env.stripe); empty leaves
    # /webhooks/stripe unregistered. The webhook_secret is whatever
    # `stripe listen` prints (whsec_...); the secret_key is a test-mode sk_test_.
    [stripe]
    webhook_secret = "${STRIPE_WEBHOOK_SECRET}"
    secret_key = "${STRIPE_SECRET_KEY}"
    # Deploy price lookup_keys, used by CancelDeploy to classify a subscription's
    # items (plan-fee vs metered) when cancelling. Same handles the dashboard
    # uses; set them in dev/.env.stripe to match your test account's prices.
    deploy_starter_lookup_key = "${STRIPE_DEPLOY_STARTER_LOOKUP_KEY}"
    deploy_pro_lookup_key = "${STRIPE_DEPLOY_PRO_LOOKUP_KEY}"
    deploy_business_lookup_key = "${STRIPE_DEPLOY_BUSINESS_LOOKUP_KEY}"
    deploy_meter_cpu_lookup_key = "${STRIPE_DEPLOY_METER_CPU_LOOKUP_KEY}"
    deploy_meter_memory_lookup_key = "${STRIPE_DEPLOY_METER_MEMORY_LOOKUP_KEY}"
    deploy_meter_egress_lookup_key = "${STRIPE_DEPLOY_METER_EGRESS_LOOKUP_KEY}"
    deploy_meter_disk_lookup_key = "${STRIPE_DEPLOY_METER_DISK_LOOKUP_KEY}"
    deploy_meter_active_keys_lookup_key = "${STRIPE_DEPLOY_METER_ACTIVE_KEYS_LOOKUP_KEY}"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ctrl-api
  namespace: unkey
  labels:
    app: ctrl-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ctrl-api
  template:
    metadata:
      labels:
        app: ctrl-api
    spec:
      serviceAccountName: unkey-serviceaccount
      containers:
        - name: ctrl-api
          image: unkey/control-api:dev
          args: ["--config", "/etc/unkey/unkey.toml"]
          imagePullPolicy: Never # Use local images
          ports:
            - containerPort: 7091
          readinessProbe:
            httpGet:
              path: /health/ready
              port: 7091
            initialDelaySeconds: 5
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /health/live
              port: 7091
            initialDelaySeconds: 10
            periodSeconds: 10
          env:
            - name: UNKEY_GITHUB_APP_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: github-credentials
                  key: UNKEY_GITHUB_APP_WEBHOOK_SECRET
                  optional: true
            - name: UNKEY_GITHUB_PRIVATE_KEY_PEM
              valueFrom:
                secretKeyRef:
                  name: github-credentials
                  key: UNKEY_GITHUB_PRIVATE_KEY_PEM
                  optional: true
            - name: UNKEY_GITHUB_APP_ID
              valueFrom:
                secretKeyRef:
                  name: github-credentials
                  key: UNKEY_GITHUB_APP_ID
                  optional: true
            - name: UNKEY_DOMAIN_CONNECT_PRIVATE_KEY
              valueFrom:
                secretKeyRef:
                  name: domain-connect-credentials
                  key: UNKEY_DOMAIN_CONNECT_PRIVATE_KEY
                  optional: true
          envFrom:
            # Every key from the optional stripe-credentials secret
            # (dev/.env.stripe): the webhook secret, the API key, and the Deploy
            # price lookup_keys CancelDeploy uses. One block instead of a
            # secretKeyRef per key, so new stripe keys need no manifest change.
            - secretRef:
                name: stripe-credentials
                optional: true
          volumeMounts:
            - name: config
              mountPath: /etc/unkey
              readOnly: true
      volumes:
        - name: config
          configMap:
            name: ctrl-api-config
      initContainers:
        - name: wait-for-dependencies
          image: busybox:1.36@sha256:73aaf090f3d85aa34ee199857f03fa3a95c8ede2ffd4cc2cdb5b94e566b11662
          command:
            [
              "sh",
              "-c",
              "until nc -z mysql 3306 && nc -z restate 8080 && nc -z vault 8060; do echo waiting for dependencies; sleep 2; done;",
            ]

---
apiVersion: v1
kind: Service
metadata:
  name: ctrl-api
  namespace: unkey
  labels:
    app: ctrl-api
spec:
  selector:
    app: ctrl-api
  ports:
    - name: http
      port: 7091
      targetPort: 7091
      protocol: TCP
  type: LoadBalancer
