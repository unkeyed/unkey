type: object
required:
  - id
  - projectId
  - appId
  - slug
  - description
  - deleteProtection
  - createdAt
properties:
  id:
    type: string
    description: |
      The unique identifier of the environment, generated by Unkey.
    example: env_1234abcd
  projectId:
    type: string
    description: |
      The unique identifier of the project this environment belongs to.
    example: proj_1234abcd
  appId:
    type: string
    description: |
      The unique identifier of the app this environment belongs to.
    example: app_1234abcd
  slug:
    type: string
    description: |
      URL-safe handle for this environment, unique within its app.
      Chosen at creation time.
    example: production
  description:
    type: string
    description: |
      Human-readable description of this environment.
      Empty string if none was provided.
    example: Production environment
  deleteProtection:
    type: boolean
    description: |
      Whether delete protection is enabled for this environment.
      When true, the environment cannot be deleted until protection is disabled.
    example: false
  createdAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the environment was created.
    example: 1704067200000
  updatedAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the environment was last updated.
      Omitted if the environment has never been updated.
    example: 1704153600000
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
additionalProperties: false
