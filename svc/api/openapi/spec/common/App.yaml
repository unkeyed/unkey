type: object
required:
  - id
  - name
  - slug
  - projectId
  - defaultBranch
  - isRolledBack
  - deleteProtection
  - createdAt
properties:
  id:
    type: string
    description: |
      The unique identifier of the app, generated by Unkey.
    example: app_1234abcd
  name:
    type: string
    description: |
      Human-readable name for this app.
    example: Payments API
  slug:
    type: string
    description: |
      URL-safe handle for this app, unique within its project.
      This is the caller-defined identifier used to reference the app in get and list operations.
    example: payments-api
  projectId:
    type: string
    description: |
      The unique identifier of the project this app belongs to.
    example: proj_1234abcd
  defaultBranch:
    type: string
    description: |
      The default git branch deployments track for this app.
    example: main
  currentDeploymentId:
    type: string
    description: |
      The identifier of the deployment currently serving this app.
      Omitted if the app has no active deployment yet.
    example: dep_1234abcd
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  isRolledBack:
    type: boolean
    description: |
      Whether the app is currently serving a rolled-back deployment rather than its latest one.
    example: false
  deleteProtection:
    type: boolean
    description: |
      Whether delete protection is enabled for this app.
      When true, the app cannot be deleted until protection is disabled.
    example: false
  createdAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the app was created.
    example: 1704067200000
  updatedAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the app was last updated.
      Omitted if the app has never been updated.
    example: 1704153600000
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
additionalProperties: false
