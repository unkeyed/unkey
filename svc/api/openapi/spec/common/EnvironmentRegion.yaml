type: object
description: Replica bounds for a single region the environment deploys to.
required:
  - name
  - replicas
properties:
  name:
    type: string
    minLength: 1
    maxLength: 64
    description: Region name, such as us-east-1.
    example: us-east-1
  replicas:
    "$ref": "./Replicas.yaml"
additionalProperties: false
