type: object
required:
  - projectId
  - name
  - slug
properties:
  projectId:
    type: string
    minLength: 8
    maxLength: 255
    pattern: "^[a-zA-Z0-9_]+$"
    description: |
      Identifies the parent project this app belongs to by its unique identifier.
      Must be a valid project ID that begins with 'proj_' and exists within your workspace.
    example: proj_1234abcd
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      Human-readable name for this app.
      Use a descriptive name like 'Payments API' to identify its purpose.
    example: Payments API
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      URL-safe handle you choose for this app, unique within the project.
      Pick a short identifier like 'payments-api'.
      Must be lowercase letters, numbers, and hyphens, starting and ending with a letter or number (no leading, trailing, or consecutive hyphens).
    example: payments-api
additionalProperties: false
examples:
  basic:
    summary: Basic app creation
    description: Create an app within a project
    value:
      projectId: proj_1234abcd
      name: Payments API
      slug: payments-api
