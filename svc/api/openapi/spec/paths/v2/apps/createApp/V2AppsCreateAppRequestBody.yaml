type: object
required:
  - project
  - name
  - slug
properties:
  project:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies the parent project this app belongs to, by either its unique ID or its slug.
      Accepts a project ID that begins with 'proj_' or a project slug.
    example: payments
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      Human-readable name for this app.
      Use a descriptive name like 'Payments API' to identify its purpose.
    example: Payments API
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      URL-safe handle you choose for this app, unique within the project.
      Pick a short identifier like 'payments-api'.
      Must be lowercase letters, numbers, and hyphens, starting and ending with a letter or number (no leading, trailing, or consecutive hyphens).
    example: payments-api
additionalProperties: false
examples:
  byProjectSlug:
    summary: Create within a project by slug
    description: Create an app, locating the parent project by its slug
    value:
      project: payments
      name: Payments API
      slug: payments-api
  byProjectId:
    summary: Create within a project by ID
    description: Create an app, locating the parent project by its ID
    value:
      project: proj_1234abcd
      name: Payments API
      slug: payments-api
