type: object
required:
  - appId
properties:
  appId:
    type: string
    minLength: 8
    maxLength: 255
    pattern: "^[a-zA-Z0-9_]+$"
    description: |
      The unique identifier of the newly created app, generated by Unkey.
      Always begins with 'app_' followed by a unique alphanumeric sequence.
    example: app_1234abcd
additionalProperties: false
