type: object
required:
  - project
  - app
properties:
  project:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies the parent project, by either its unique ID or its slug.
      Required to resolve the app, since app slugs are only unique within a project.
    example: payments
  app:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies which app to retrieve, by either its unique ID or its slug.
      Accepts an app ID that begins with 'app_' or an app slug. The app must exist within the specified project.
    example: app_1234abcd
additionalProperties: false
examples:
  getById:
    summary: Retrieve by app ID
    description: Fetch an app using its unique identifier
    value:
      project: payments
      app: app_1234abcd
  getBySlug:
    summary: Retrieve by app slug
    description: Fetch an app using its slug
    value:
      project: payments
      app: payments-api
