type: object
required:
  - appId
properties:
  appId:
    type: string
    minLength: 8
    maxLength: 255
    pattern: "^[a-zA-Z0-9_]+$"
    description: |
      Specifies which app to retrieve by its unique identifier.
      Must be a valid app ID that begins with 'app_' and exists within your workspace.
    example: app_1234abcd
additionalProperties: false
examples:
  basic:
    summary: Retrieve an app by ID
    description: Fetch a single app using its unique identifier
    value:
      appId: app_1234abcd
