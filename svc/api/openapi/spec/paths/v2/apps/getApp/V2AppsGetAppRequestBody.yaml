type: object
required:
  - projectSlug
  - slug
properties:
  projectSlug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      The slug of the project this app belongs to, unique within your workspace.
      Identifies the parent project the app is looked up under.
    example: payments-service
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      URL-safe handle of the app to retrieve, unique within its project.
      This is the caller-defined identifier returned when the app was created.
    example: payments-api
additionalProperties: false
examples:
  basic:
    summary: Retrieve an app by slug
    description: Fetch a single app using its project slug and app slug
    value:
      projectSlug: payments-service
      slug: payments-api
