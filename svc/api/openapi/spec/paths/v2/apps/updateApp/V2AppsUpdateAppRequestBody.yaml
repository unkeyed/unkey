type: object
required:
  - project
  - app
properties:
  project:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies the parent project, by either its unique ID or its slug.
      Required to resolve the app, since app slugs are only unique within a project.
    example: payments
  app:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies which app to update, by either its unique ID or its slug.
      Accepts an app ID that begins with 'app_' or an app slug. The app must exist within the specified project.
      The app is resolved by its immutable ID, so you can pass the current slug here while also changing it via the slug field.
    example: app_1234abcd
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      New human-readable name for the app.
      Omit this field to leave the current name unchanged.
    example: Payments API
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      New URL-safe handle for the app, unique within its project.
      Must be lowercase letters, numbers, and hyphens, starting and ending with a letter or number (no leading, trailing, or consecutive hyphens).
      Omit this field to leave the current slug unchanged.
    example: payments-api
  defaultBranch:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      New default git branch deployments track for this app.
      Omit this field to leave the current branch unchanged.
    example: main
  deleteProtection:
    type: boolean
    description: |
      Enable or disable delete protection for the app.
      Omit this field to leave the current setting unchanged.
    example: true
additionalProperties: false
examples:
  rename:
    summary: Rename an app by ID
    description: Update only the display name, locating the app by its ID
    value:
      project: payments
      app: app_1234abcd
      name: Payments API
  changeSlug:
    summary: Change an app slug by slug
    description: Locate the app by its current slug and assign a new one
    value:
      project: payments
      app: payments-service
      slug: payments-api
  protect:
    summary: Toggle delete protection
    description: Enable delete protection without changing the name
    value:
      project: payments
      app: app_1234abcd
      deleteProtection: true
