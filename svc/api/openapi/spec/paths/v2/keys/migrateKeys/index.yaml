post:
  tags:
    - keys
  summary: Migrate API key(s)
  description: |
    Returns HTTP 200 even on partial success; hashes that could not be migrated are listed under `data.failed`.

    **Required Permissions**
    Your credential must have one of the following permissions:
    - `api.*.create_key` (to migrate keys to any API)
    - `api.<api_id>.create_key` (to migrate keys to a specific API)
    - `unkey:v1:<workspace_id>:keyspaces/*#create_key` (to migrate keys into any keyspace)
    - `unkey:v1:<workspace_id>:keyspaces/<keyspace_id>#create_key` (to migrate keys into a specific keyspace)
  operationId: keys.migrateKeys
  x-speakeasy-name-override: migrateKeys
  security:
    - rootKey: []
    - dashboard: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "./V2KeysMigrateKeysRequestBody.yaml"
    required: true
  responses:
    "200":
      content:
        application/json:
          schema:
            "$ref": "./V2KeysMigrateKeysResponseBody.yaml"
      description: Successfully migrated keys.
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            "$ref": "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden
      content:
        application/json:
          schema:
            "$ref": "../../../../error/ForbiddenErrorResponse.yaml"
    "404":
      description: Not found
      content:
        application/json:
          schema:
            "$ref": "../../../../error/NotFoundErrorResponse.yaml"
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            $ref: "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            "$ref": "../../../../error/InternalServerErrorResponse.yaml"
