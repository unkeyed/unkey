type: object
required:
  - meta
  - data
properties:
  meta:
    "$ref": "../../../../common/Meta.yaml"
  data:
    type: array
    items:
      "$ref": "./EnvironmentVariableMetadata.yaml"
    description: |
      The variables that were set, echoed back as metadata. Values are never
      returned.
additionalProperties: false
examples:
  success:
    summary: Variables set
    value:
      meta:
        requestId: req_1234abcd
      data:
        - key: DATABASE_URL
          sensitive: true
        - key: LOG_LEVEL
          sensitive: false
          description: Application log verbosity
