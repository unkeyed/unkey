type: object
description: Desired replica bounds for a single region.
properties:
  name:
    type: string
    minLength: 1
    maxLength: 64
    description: Region name, such as us-east-1.
    example: us-east-1
  replicas:
    type: object
    description: Min and max replica bounds for autoscaling in this region.
    properties:
      min:
        type: integer
        description: |
          Minimum replicas. Bounds are enforced server-side and vary by
          workspace; requests outside the allowed range return 400.
        example: 1
      max:
        type: integer
        description: |
          Maximum replicas, must be >= min. Bounds are enforced server-side
          and vary by workspace; requests outside the allowed range return 400.
        example: 3
    required:
      - min
      - max
    additionalProperties: false
required:
  - name
  - replicas
additionalProperties: false
