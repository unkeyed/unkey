type: object
required:
  - project
  - app
  - environment
properties:
  project:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies the parent project, by either its unique ID or its slug.
      Required to resolve the app, since app slugs are only unique within a project.
    example: payments
  app:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies the parent app, by either its unique ID or its slug.
      Required to resolve the environment, since environment slugs are only unique within an app.
    example: payments-api
  environment:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies which environment to retrieve, by either its unique ID or its slug.
      Accepts an environment ID that begins with 'env_' or an environment slug. The environment must exist within the specified app.
    example: env_1234abcd
additionalProperties: false
examples:
  getById:
    summary: Retrieve by environment ID
    description: Fetch an environment using its unique identifier
    value:
      project: payments
      app: payments-api
      environment: env_1234abcd
  getBySlug:
    summary: Retrieve by environment slug
    description: Fetch an environment using its slug
    value:
      project: payments
      app: payments-api
      environment: production
