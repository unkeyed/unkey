post:
  tags:
    - environments
  summary: Get environment
  description: |
    Retrieve a single environment by its id.

    Use this to fetch environment details after creation or to verify an environment exists before performing operations.

    **Required Permissions**

    Your root key must have one of the following permissions:
    - `project.*.read_environment` (to read environments in any project)
    - `project.<project_id>.read_environment` (to read environments in a specific project)
  operationId: environments.getEnvironment
  x-speakeasy-name-override: getEnvironment
  security:
    - rootKey: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "./V2EnvironmentsGetEnvironmentRequestBody.yaml"
        examples:
          getById:
            summary: Retrieve by environment ID
            description: Fetch an environment using its unique identifier
            value:
              project: payments
              app: payments-api
              environment: env_1234abcd
          getBySlug:
            summary: Retrieve by environment slug
            description: Fetch an environment using its slug
            value:
              project: payments
              app: payments-api
              environment: production
    required: true
  responses:
    "200":
      description: |
        Successfully retrieved the environment.
      content:
        application/json:
          schema:
            "$ref": "./V2EnvironmentsGetEnvironmentResponseBody.yaml"
          examples:
            environment:
              summary: Environment details
              description: Successfully retrieved an environment
              value:
                meta:
                  requestId: req_1234abcd
                data:
                  id: env_1234abcd
                  projectId: proj_1234abcd
                  appId: app_1234abcd
                  slug: production
                  description: Production environment
                  deleteProtection: false
                  createdAt: 1704067200000
                  updatedAt: 1704153600000
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            "$ref": "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden - Insufficient permissions (requires `project.*.read_environment`)
      content:
        application/json:
          schema:
            "$ref": "../../../../error/ForbiddenErrorResponse.yaml"
          examples:
            missingPermission:
              summary: Missing required permission
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Forbidden
                  detail: Your root key requires the 'project.*.read_environment' permission to perform this operation
                  status: 403
                  type: forbidden
    "404":
      description: Not Found - The requested environment does not exist in your workspace
      content:
        application/json:
          schema:
            "$ref": "../../../../error/NotFoundErrorResponse.yaml"
          examples:
            environmentNotFound:
              summary: Environment not found
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Not Found
                  detail: The requested environment does not exist.
                  status: 404
                  type: not-found
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            "$ref": "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            "$ref": "../../../../error/InternalServerErrorResponse.yaml"
