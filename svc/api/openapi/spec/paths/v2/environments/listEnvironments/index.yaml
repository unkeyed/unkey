post:
  tags:
    - environments
  summary: List environments
  description: |
    Retrieve a paginated list of environments within an app.

    Use this to enumerate every environment in an app. Identify the app by its project slug and app slug. Results are ordered by environment id and paginated; when `hasMore` is true, pass the returned `cursor` to fetch the next page.

    **Required Permissions**

    Your root key must have the following permission:
    - `environment.*.read_environment` (to read environments in any app)
  operationId: environments.listEnvironments
  x-speakeasy-name-override: listEnvironments
  security:
    - rootKey: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "./V2EnvironmentsListEnvironmentsRequestBody.yaml"
        examples:
          basic:
            summary: List an app's environments
            description: List the first page of environments in the given app
            value:
              project: payments-service
              app: payments-api
    required: true
  responses:
    "200":
      content:
        application/json:
          schema:
            "$ref": "./V2EnvironmentsListEnvironmentsResponseBody.yaml"
          examples:
            environmentList:
              summary: Environment list
              description: Successfully retrieved a page of environments
              value:
                meta:
                  requestId: req_1234abcd
                data:
                  - id: env_1234abcd
                    projectId: proj_1234abcd
                    appId: app_1234abcd
                    slug: production
                    description: Production environment
                    deleteProtection: false
                    createdAt: 1704067200000
                    updatedAt: 1704153600000
                  - id: env_5678efgh
                    projectId: proj_1234abcd
                    appId: app_1234abcd
                    slug: staging
                    description: Staging environment
                    deleteProtection: false
                    createdAt: 1704240000000
                pagination:
                  hasMore: false
      description: |
        Successfully retrieved a paginated list of environments. Use the pagination cursor for additional results when `hasMore: true`.
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            "$ref": "../../../../error/BadRequestErrorResponse.yaml"
          examples:
            invalidLimit:
              summary: Invalid limit
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Bad Request
                  detail: The limit must be between 1 and 100.
                  status: 400
                  type: validation-error
                  errors:
                    - location: body.limit
                      message: must be less than or equal to 100
                      fix: Use a limit between 1 and 100
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden - Insufficient permissions (requires `environment.*.read_environment`)
      content:
        application/json:
          schema:
            "$ref": "../../../../error/ForbiddenErrorResponse.yaml"
          examples:
            missingPermission:
              summary: Missing required permission
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Forbidden
                  detail: Your root key requires the 'environment.*.read_environment' permission to perform this operation
                  status: 403
                  type: forbidden
    "404":
      description: Not Found - The requested app does not exist in your workspace
      content:
        application/json:
          schema:
            "$ref": "../../../../error/NotFoundErrorResponse.yaml"
          examples:
            appNotFound:
              summary: App not found
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Not Found
                  detail: The requested app does not exist.
                  status: 404
                  type: not-found
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            "$ref": "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            "$ref": "../../../../error/InternalServerErrorResponse.yaml"
  x-speakeasy-pagination:
    type: cursor
    inputs:
      - name: cursor
        in: requestBody
        type: cursor
    outputs:
      nextCursor: "$.pagination.cursor"
