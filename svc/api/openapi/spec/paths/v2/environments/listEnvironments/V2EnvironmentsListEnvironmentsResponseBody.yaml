    value:
      meta:
        requestId: req_5678efgh
      data:
        - id: env_1111aaaa
          projectId: proj_1234abcd
          appId: app_1234abcd
          slug: production
          description: Production environment
          deleteProtection: false
          createdAt: 1704067200000
        - id: env_2222bbbb
          projectId: proj_1234abcd
          appId: app_1234abcd
          slug: staging
