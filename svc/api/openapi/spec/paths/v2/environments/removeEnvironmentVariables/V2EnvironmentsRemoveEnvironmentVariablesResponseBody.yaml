type: object
required:
  - meta
  - data
properties:
  meta:
    "$ref": "../../../../common/Meta.yaml"
  data:
    type: array
    items:
      "$ref": "../setEnvironmentVariables/EnvironmentVariableMetadata.yaml"
    description: |
      The full remaining set of variables for the environment after the
      removal, echoed back as metadata. Values are never returned.
additionalProperties: false
examples:
  success:
    summary: Variables removed
    value:
      meta:
        requestId: req_1234abcd
      data:
        - key: DATABASE_URL
          sensitive: true
          deleteProtection: false
