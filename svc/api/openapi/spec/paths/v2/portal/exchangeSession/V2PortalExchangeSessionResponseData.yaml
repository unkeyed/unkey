type: object
required:
  - token
  - expiresAt
properties:
  token:
    type: string
    description: |
      The browser session token. Use this in the Authorization header or as an httpOnly cookie
      for subsequent API calls.
    example: ps_xyz789abc123
  expiresAt:
    type: integer
    format: int64
    description: |
      Unix timestamp in milliseconds when the browser session expires (24 hours from creation).
    example: 1711386400000
additionalProperties: false
