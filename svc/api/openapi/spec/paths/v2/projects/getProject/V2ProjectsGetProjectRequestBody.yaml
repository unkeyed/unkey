type: object
required:
  - slug
properties:
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9-]+$"
    description: |
      URL-safe handle of the project to retrieve, unique within your workspace.
      This is the caller-defined identifier returned when the project was created.
    example: payments-service
additionalProperties: false
examples:
  basic:
    summary: Retrieve a project by slug
    description: Fetch a single project using its workspace-unique slug
    value:
      slug: payments-service
