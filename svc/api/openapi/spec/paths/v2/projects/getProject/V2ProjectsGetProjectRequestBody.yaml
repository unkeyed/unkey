type: object
required:
  - projectId
properties:
  projectId:
    type: string
    minLength: 8
    maxLength: 255
    pattern: "^[a-zA-Z0-9_]+$"
    description: |
      Specifies which project to retrieve by its unique identifier.
      Must be a valid project ID that begins with 'proj_' and exists within your workspace.
    example: proj_1234abcd
additionalProperties: false
examples:
  basic:
    summary: Retrieve a project by ID
    description: Fetch a single project using its unique identifier
    value:
      projectId: proj_1234abcd
