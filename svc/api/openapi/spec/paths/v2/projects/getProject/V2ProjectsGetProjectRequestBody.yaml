type: object
required:
  - project
properties:
  project:
    type: string
    minLength: 1
    maxLength: 255
    description: |
      Specifies which project to retrieve by its unique identifier or slug.
      Must be a valid project ID that begins with 'proj_' or slug, and exists within your workspace.
    example: proj_1234abcd
additionalProperties: false
examples:
  getById:
    summary: Retrieve a project by ID
    description: Fetch a single project using its unique identifier
    value:
      projectId: proj_1234abcd
  getBySlug:
    summary: Retrieve a project by slug
    description: Fetch a single project using its slug
    value:
      projectId: payment-service
