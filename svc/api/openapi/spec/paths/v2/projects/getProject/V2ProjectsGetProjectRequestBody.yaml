type: object
required:
  - project
properties:
  project:
    type: string
    minLength: 3
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies which project to retrieve, by either its unique ID or its slug.
      Accepts a project ID that begins with 'proj_' or a project slug. The project must exist within your workspace.
    example: proj_1234abcd
additionalProperties: false
examples:
  getById:
    summary: Retrieve by project ID
    description: Fetch a project using its unique identifier
    value:
      project: proj_1234abcd
  getBySlug:
    summary: Retrieve by project slug
    description: Fetch a project using its slug
    value:
      project: payment-service
