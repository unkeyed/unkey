type: object
required:
  - project
properties:
  project:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies which project to update, by either its unique ID or its slug.
      Accepts a project ID that begins with 'proj_' or a project slug. The project must exist within your workspace.
      The project is resolved by its immutable ID, so you can pass the current slug here while also changing it via the slug field.
    example: proj_1234abcd
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      New URL-safe slug for the project, unique within your workspace.
      Changing it affects the deployment domains generated for this project.
      Omit this field to leave the current slug unchanged.
    example: payments-service
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      New human-readable name for the project.
      Omit this field to leave the current name unchanged.
    example: Payments Service
  deleteProtection:
    type: boolean
    description: |
      Enable or disable delete protection for the project.
      Omit this field to leave the current setting unchanged.
    example: true
additionalProperties: false
examples:
  rename:
    summary: Rename a project by ID
    description: Update only the display name, locating the project by its ID
    value:
      project: proj_1234abcd
      name: Payments API
  changeSlug:
    summary: Change a project slug by slug
    description: Locate the project by its current slug and assign a new one
    value:
      project: payments-service
      slug: payments-api
  protect:
    summary: Toggle delete protection
    description: Enable delete protection without changing the name
    value:
      project: proj_1234abcd
      deleteProtection: true
