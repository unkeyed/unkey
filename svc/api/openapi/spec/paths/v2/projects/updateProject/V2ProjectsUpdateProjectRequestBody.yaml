type: object
required:
  - slug
properties:
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      Specifies which project to update using the URL-safe slug you chose when creating the project, unique within your workspace.
      Do not confuse this with the project ID returned from `createProject`.
    example: payments-service
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      New human-readable name for the project.
      Omit this field to leave the current name unchanged.
    example: Payments Service
  deleteProtection:
    type: boolean
    description: |
      Enable or disable delete protection for the project.
      Omit this field to leave the current setting unchanged.
    example: true
additionalProperties: false
examples:
  rename:
    summary: Rename a project
    description: Update only the display name of a project
    value:
      slug: payments-service
      name: Payments API
  protect:
    summary: Toggle delete protection
    description: Enable delete protection without changing the name
    value:
      slug: payments-service
      deleteProtection: true
