post:
  tags:
    - projects
  summary: Update project
  description: |
    Update an existing project in your workspace, identified by its id.

    The project name, slug, and delete protection setting can be changed. Omitted fields are left unchanged. Changing the slug affects the deployment domains generated for this project.

    **Required Permissions**

    Your root key must have one of the following permissions:
    - `project.*.update_project` (to update any project)
    - `project.<project_id>.update_project` (to update a specific project)
  operationId: projects.updateProject
  x-speakeasy-name-override: updateProject
  security:
    - rootKey: []
  requestBody:
    content:
      application/json:
        schema:
          "$ref": "./V2ProjectsUpdateProjectRequestBody.yaml"
        examples:
          rename:
            summary: Rename a project
            description: Update only the display name of a project
            value:
              projectId: proj_1234abcd
              name: Payments API
          changeSlug:
            summary: Change a project slug
            description: Update the URL-safe slug of a project
            value:
              projectId: proj_1234abcd
              slug: payments-api
    required: true
  responses:
    "200":
      description: |
        Successfully updated the project.
      content:
        application/json:
          schema:
            "$ref": "./V2ProjectsUpdateProjectResponseBody.yaml"
          examples:
            project:
              summary: Updated project
              description: Successfully updated a project
              value:
                meta:
                  requestId: req_1234abcd
                data:
                  id: proj_1234abcd
                  name: Payments API
                  slug: payments-service
                  createdAt: 1704067200000
                  updatedAt: 1704153600000
                  deleteProtection: true
    "400":
      description: Bad request
      content:
        application/json:
          schema:
            "$ref": "../../../../error/BadRequestErrorResponse.yaml"
    "401":
      description: Unauthorized
      content:
        application/json:
          schema:
            "$ref": "../../../../error/UnauthorizedErrorResponse.yaml"
    "403":
      description: Forbidden - Insufficient permissions (requires `project.*.update_project`)
      content:
        application/json:
          schema:
            "$ref": "../../../../error/ForbiddenErrorResponse.yaml"
          examples:
            missingPermission:
              summary: Missing required permission
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Forbidden
                  detail: Your root key requires the 'project.*.update_project' permission to perform this operation
                  status: 403
                  type: forbidden
    "404":
      description: Not Found - The requested project does not exist in your workspace
      content:
        application/json:
          schema:
            "$ref": "../../../../error/NotFoundErrorResponse.yaml"
          examples:
            projectNotFound:
              summary: Project not found
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Not Found
                  detail: The requested project does not exist.
                  status: 404
                  type: not-found
    "409":
      description: Conflict - Project with this slug already exists
      content:
        application/json:
          schema:
            "$ref": "../../../../error/ConflictErrorResponse.yaml"
          examples:
            projectExists:
              summary: Project already exists
              value:
                meta:
                  requestId: req_1234abcd
                error:
                  title: Conflict
                  detail: A project with slug 'payments-api' already exists in this workspace.
                  status: 409
                  type: conflict
    "429":
      description: Too Many Requests
      content:
        application/problem+json:
          schema:
            "$ref": "../../../../error/TooManyRequestsErrorResponse.yaml"
    "500":
      description: Internal server error
      content:
        application/json:
          schema:
            "$ref": "../../../../error/InternalServerErrorResponse.yaml"
