type: object
required:
  - name
  - slug
properties:
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      Human-readable name for this project.
      Use a descriptive name like 'Payments Service' to identify its purpose.
    example: Payments Service
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      URL-safe handle you choose for this project, unique within your workspace.
      Pick a short identifier like 'payments-service'. It identifies the project when you deploy and is embedded in the generated deployment domains.
      Must be lowercase letters, numbers, and hyphens, starting and ending with a letter or number (no leading, trailing, or consecutive hyphens).
    example: payments-service
  deleteProtection:
    type: boolean
    description: |
      Enable delete protection for the project on creation.
      Defaults to false. When enabled, the project cannot be deleted until protection is disabled via updateProject.
    example: true
additionalProperties: false
examples:
  basic:
    summary: Basic project creation
    description: Create a project for a payment service
    value:
      name: Payments Service
      slug: payments-service
  protected:
    summary: Create a project with delete protection
    description: Create a project that cannot be deleted until protection is disabled
    value:
      name: Payments Service
      slug: payments-service
      deleteProtection: true
