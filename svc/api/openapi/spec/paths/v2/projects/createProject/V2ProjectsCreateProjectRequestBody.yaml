type: object
required:
  - name
  - slug
properties:
  name:
    type: string
    minLength: 1
    maxLength: 256
    description: |
      Human-readable name for this project.
      Use a descriptive name like 'Payments Service' to identify its purpose.
    example: Payments Service
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9-]+$"
    description: |
      URL-safe handle for this project, unique within your workspace.
      This value is caller-defined (not generated by Unkey), stable over the project lifetime, and is the identifier used to reference this project in get, update, and delete operations.
      Must contain only lowercase letters, numbers, and hyphens.
    example: payments-service
additionalProperties: false
examples:
  basic:
    summary: Basic project creation
    description: Create a project for a payment service
    value:
      name: Payments Service
      slug: payments-service
