type: object
required:
  - id
  - slug
properties:
  id:
    type: string
    minLength: 8
    maxLength: 255
    pattern: "^[a-zA-Z0-9_]+$"
    description: |
      The unique identifier of the newly created project, generated by Unkey.
      Always begins with 'proj_' followed by a unique alphanumeric sequence.
    example: proj_1234abcd
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9]+(-[a-z0-9]+)*$"
    description: |
      The workspace-scoped slug of the newly created project.
      Use this value to reference the project in subsequent get, update, and delete operations.
    example: payments-service
additionalProperties: false
