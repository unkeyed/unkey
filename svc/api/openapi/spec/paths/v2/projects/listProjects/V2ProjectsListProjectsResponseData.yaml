type: object
required:
  - id
  - name
  - slug
  - createdAt
properties:
  id:
    type: string
    description: |
      The unique identifier of the project, generated by Unkey.
    example: proj_1234abcd
  name:
    type: string
    description: |
      Human-readable name for this project.
    example: Payments Service
  slug:
    type: string
    description: |
      URL-safe handle for this project, unique within your workspace.
      This is the caller-defined identifier used to reference the project in get, update, and delete operations.
    example: payments-service
  createdAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the project was created.
    example: 1704067200000
  updatedAt:
    type: integer
    format: int64
    minimum: 0
    maximum: 9223372036854775807
    description: |
      Unix timestamp in milliseconds when the project was last updated.
      Omitted if the project has never been updated.
    example: 1704153600000
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
  deleteProtection:
    type: boolean
    description: |
      Whether delete protection is enabled for this project.
      When true, the project cannot be deleted until protection is disabled.
    example: false
    x-go-type-skip-optional-pointer: true
    x-go-type-skip-optional-pointer-with-omitzero: true
additionalProperties: false
