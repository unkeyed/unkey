type: object
required:
  - project
properties:
  project:
    type: string
    minLength: 1
    maxLength: 255
    pattern: "^[a-zA-Z0-9_-]+$"
    description: |
      Identifies which project to delete, by either its unique ID or its slug.
      Accepts a project ID that begins with 'proj_' or a project slug. The project must exist within your workspace.
    example: proj_1234abcd
additionalProperties: false
examples:
  deleteById:
    summary: Delete by project ID
    description: Delete a project using its unique identifier
    value:
      project: proj_1234abcd
  deleteBySlug:
    summary: Delete by project slug
    description: Delete a project using its slug
    value:
      project: payment-service
