type: object
required:
  - slug
properties:
  slug:
    type: string
    minLength: 1
    maxLength: 256
    pattern: "^[a-z0-9-]+$"
    description: |
      URL-safe handle identifying the project to delete, unique within your workspace.
      This is the caller-defined identifier returned when the project was created.
    example: payments-service
additionalProperties: false
examples:
  delete:
    summary: Delete a project
    description: Delete a project by its slug
    value:
      slug: payments-service
