syntax = "proto3";

package hydra.v1;

import "dev/restate/sdk/go.proto";

option go_package = "github.com/unkeyed/unkey/gen/proto/hydra/v1;hydrav1";

// RatelimitBlocklistCleanupService prunes expired rows from
// ratelimit_blocklist so the cross-region propagation table stays bounded.
//
// Stateless — safe to invoke at any cadence. Local in-memory state in the
// ratelimit service is cleaned by its own janitor (every minute), and the
// hot path filters on expires_at > NOW() regardless. This cron exists only
// to keep the MySQL table small enough that BlocklistListActive scans cheap
// and storage stays bounded under sustained abuse.
service RatelimitBlocklistCleanupService {
  option (dev.restate.sdk.go.service_type) = SERVICE;

  // RunCleanup deletes every row where expires_at < NOW(). The hourly
  // schedule means at most one window's worth of expired rows ever lives in
  // the table.
  rpc RunCleanup(RunCleanupRequest) returns (RunCleanupResponse) {}
}

message RunCleanupRequest {}

message RunCleanupResponse {
  // Number of rows deleted in this invocation.
  int64 rows_deleted = 1;
}
