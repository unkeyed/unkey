syntax = "proto3";
package hydra.v1;

import "dev/restate/sdk/go.proto";

option go_package = "github.com/unkeyed/unkey/gen/proto/hydra/v1;hydrav1";

// DeployService orchestrates the lifecycle of application deployments as
// durable Restate workflows. Each RPC is idempotent and can safely resume from
// any step after a crash.
//
// Deploy, Rollback, and Promote are keyed by {app_id}:{environment_id} so
// that lifecycle operations within a single environment are serialized
// (preventing e.g. a rollback from racing with an in-flight deploy) while
// different environments of the same app — e.g. production vs preview — can
// deploy in parallel. This means a production push never waits behind a
// preview build. Workspace-wide concurrency is separately enforced by
// BuildSlotService.
//
// Deploy handles the full pipeline from building Docker images through
// provisioning containers and configuring domain routing. Rollback and Promote
// manage traffic switching between deployments by reassigning sticky frontline
// routes atomically through the routing service.
service DeployService {
  option (dev.restate.sdk.go.service_type) = VIRTUAL_OBJECT;

  // Deploy executes the full deployment workflow: build (if git source), provision
  // containers across regions, wait for health, configure domain routing, and
  // update the project's live deployment pointer for production environments.
  // Sets deployment status to failed on any error.
  rpc Deploy(DeployRequest) returns (DeployResponse) {}

  // Rollback switches sticky frontline routes (environment and live) from the
  // current live deployment back to a previous one. Marks the project as rolled
  // back so future deploys don't automatically reclaim live routes.
  // Source must be the current live deployment; both must share the same project
  // and environment.
  rpc Rollback(RollbackRequest) returns (RollbackResponse) {}

  // Promote reassigns sticky frontline routes to a target deployment and clears
  // the rolled-back flag, restoring normal deployment flow.
  // Target must be in ready status and not already the live deployment.
  rpc Promote(PromoteRequest) returns (PromoteResponse) {}

  // StopDeployment schedules desired_state=stopped for a running deployment.
  rpc StopDeployment(StopDeploymentRequest) returns (StopDeploymentResponse) {}

  // WakeDeployment schedules desired_state=running for a stopped deployment
  // and waits until enough instances are running again.
  rpc WakeDeployment(WakeDeploymentRequest) returns (WakeDeploymentResponse) {}

  // NotifyInstancesReady is called by the control plane when enough instances
  // have become healthy across the required regions. It resolves the awakeable
  // stored by a suspended deploy or wake workflow so it can continue.
  rpc NotifyInstancesReady(NotifyInstancesReadyRequest) returns (NotifyInstancesReadyResponse) {
    option (dev.restate.sdk.go.handler_type) = SHARED;
  }
}

message StopDeploymentRequest {
  string deployment_id = 1;
}

message StopDeploymentResponse {}

message WakeDeploymentRequest {
  string deployment_id = 1;
}

message WakeDeploymentResponse {}

message NotifyInstancesReadyRequest {
  string deployment_id = 1;
}

message NotifyInstancesReadyResponse {
  bool resolved = 1;
}

// DockerImage references a pre-built container image to deploy directly,
// skipping the build step.
message DockerImage {
  string image = 1;
}

// GitSource specifies a repository and commit to build a Docker image from.
message GitSource {
  // GitHub App installation ID used to clone the repository.
  int64 installation_id = 1;

  // Full repository identifier (e.g., "owner/repo").
  string repository = 2;

  // Commit SHA to build.
  string commit_sha = 3;

  // Subdirectory within the repository to use as the Docker build context.
  string context_path = 4;

  // Path to the Dockerfile, relative to context_path. Empty means no
  // Dockerfile is configured and the image is built with Railpack instead.
  string dockerfile_path = 5;

  // Branch name used to resolve commit_sha when it is empty. The deploy worker
  // calls GitHub to look up the HEAD commit of this branch.
  string branch = 6;

  // PR number for fork PRs. When set, BuildKit fetches refs/pull/<number>/head
  // from the base repo instead of using commit_sha directly.
  int64 pr_number = 7;

  // Full fork repository identifier (e.g., "contributor/repo"). When set, the
  // deploy worker uses the public GitHub API and clones from the fork repo.
  string fork_repository = 8;

  // Custom build command for Railpack builds (RAILPACK_BUILD_CMD). Empty means
  // Railpack auto-detects the command. Lets monorepos scope the build to a
  // single app. Ignored when dockerfile_path is set.
  string build_command = 9;

  // Custom install command for Railpack builds (RAILPACK_INSTALL_CMD). Empty
  // means Railpack auto-detects the command. Ignored when dockerfile_path is set.
  string install_command = 10;
}

message DeployRequest {
  string deployment_id = 1;

  // TODO: remove this field, it is unused.
  optional string key_auth_id = 2;

  oneof source {
    GitSource git = 3;
    DockerImage docker_image = 4;
  }

  // Container command override (e.g., ["./app", "serve"])
  repeated string command = 5;
}

message DeployResponse {}

// RollbackRequest identifies the deployment to roll back from and the
// deployment to restore. Both must belong to the same project and environment.
message RollbackRequest {
  // The current live deployment to roll back from.
  string source_deployment_id = 1;

  // A previous deployment to restore traffic to.
  string target_deployment_id = 2;
}

message RollbackResponse {}

// PromoteRequest identifies a ready deployment to promote to live.
message PromoteRequest {
  string target_deployment_id = 1;
}

message PromoteResponse {}
