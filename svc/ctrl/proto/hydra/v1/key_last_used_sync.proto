syntax = "proto3";

package hydra.v1;

import "dev/restate/sdk/go.proto";

option go_package = "github.com/unkeyed/unkey/gen/proto/hydra/v1;hydrav1";

// KeyLastUsedPartitionService processes a single hash partition of the
// keyspace. Invoked from the unified CronService's RunKeyLastUsedSync
// orchestrator handler.
//
// Keyed by partition index (e.g. "0", "1", ... "7"). Persists a cursor
// in Restate state so subsequent runs only process new data.
service KeyLastUsedPartitionService {
  option (dev.restate.sdk.go.service_type) = VIRTUAL_OBJECT;

  // SyncPartition reads keys from ClickHouse for this partition and
  // batch-updates MySQL. The cursor is persisted in Restate state
  // between invocations.
  rpc SyncPartition(SyncPartitionRequest) returns (SyncPartitionResponse) {}
}

message SyncPartitionRequest {
  // Total number of partitions. The partition index is derived from the
  // Restate object key (e.g. "3").
  int32 total_partitions = 1;
}

message SyncPartitionResponse {
  // Number of keys synced by this partition.
  int32 keys_synced = 1;
}
