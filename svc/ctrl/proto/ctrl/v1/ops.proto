syntax = "proto3";
package ctrl.v1;

option go_package = "github.com/unkeyed/unkey/gen/proto/ctrl/v1;ctrlv1";

// OpsService hosts internal operator RPCs that aren't part of the normal
// customer-facing deploy flow. These exist for recovery and hotfix
// scenarios (e.g. rebuilding a deployment whose image was lost, rolling
// out a runtime-settings or env-var change without a code change). All
// RPCs here are bearer-authenticated.
service OpsService {
  // RebuildDeployment creates a new deployment that clones the given source
  // deployment's project, app, and environment, then kicks off the deploy
  // workflow. The new deployment inherits the app's *current* runtime
  // settings and env vars — config drift since the source applies.
  //
  // Source resolution:
  //   1. If the source has a git_commit_sha AND the app has a github repo
  //      connection, rebuild from the pinned SHA.
  //   2. Otherwise reuse the source deployment's docker image verbatim.
  //   3. If neither is available, the RPC fails.
  //
  // Guardrail (unless `force` is true): no newer active deployment may exist
  // on the same (app, environment, branch).
  //
  // The new deployment is persisted with trigger=UNKEY and the provided
  // reason so this path is visible in the deployments list.
  rpc RebuildDeployment(RebuildDeploymentRequest) returns (RebuildDeploymentResponse) {}
}

message RebuildDeploymentRequest {
  // The deployment to rebuild. A NEW deployment is created; the source row
  // is not mutated.
  string deployment_id = 1;

  // Free-form reason (e.g. "image lost after pod move"). Stored on the new
  // deployment as trigger_reason.
  string reason = 2;

  // When true, skip the "newer sibling exists" guardrail. Use only when
  // intentionally re-running on top of a failed newer attempt.
  bool force = 3;
}

message RebuildDeploymentResponse {
  // The id of the newly created deployment.
  string deployment_id = 1;
}
