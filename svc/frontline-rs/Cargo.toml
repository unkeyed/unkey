[package]
name = "unkey-frontline"
version = "0.1.0"
edition.workspace = true
license.workspace = true
repository.workspace = true
description = "Unkey frontline: multi-tenant TLS-terminating ingress (Rust port of svc/frontline, routing/proxy scope)"

[[bin]]
name = "unkey-frontline"
path = "src/main.rs"

# Dependency policy: lean, but the request hot path runs on tokio + hyper —
# benchmarks against the Go service showed the hand-rolled thread-per-
# connection HTTP stack cost throughput and correctness under load (see
# BENCHMARKS.md). Everything off the hot path stays hand-rolled (metrics,
# structured logging, encodings, SWR cache, uid generation, the sync HTTP
# client used for vault/ctrl/ClickHouse).
#
#   tokio / hyper / hyper-util / ...        async request hot path.
#   rustls / tokio-rustls / ...             TLS termination + outbound TLS.
#   mysql                                   MySQL wire protocol + auth.
#   serde / serde_json                      Connect RPC payloads, ClickHouse
#                                           rows, JSON error bodies.
#   toml                                    config files (parity with the Go service).
[dependencies]
tokio = { version = "1", features = ["rt-multi-thread", "macros", "net", "time", "io-util", "sync"] }
hyper = { version = "1", features = ["http1", "server", "client"] }
hyper-util = { version = "0.1", features = ["http1", "server", "client-legacy", "tokio"] }
http = "1"
http-body-util = "0.1"
bytes = "1"
tokio-rustls = { version = "0.26", default-features = false, features = ["ring", "tls12"] }
hyper-rustls = { version = "0.27", default-features = false, features = ["http1", "ring", "webpki-tokio", "tls12"] }
rustls = { version = "0.23", default-features = false, features = ["ring", "std", "tls12", "logging"] }
rustls-pemfile = "2"
webpki-roots = "0.26"
mysql = { version = "25", default-features = false, features = ["minimal", "rustls-tls"] }
serde = { version = "1", features = ["derive"] }
serde_json = "1"
toml = "0.8"
