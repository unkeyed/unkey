name: unkey-dashboard-dev
services:
  mysql:
    networks:
      - default
    container_name: mysql
    build:
      context: ../../../..
      dockerfile: dev/Dockerfile.mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: unkey
      MYSQL_USER: unkey
      MYSQL_PASSWORD: password
    command: ["--max_connections=1000", "--skip-log-bin"]
    ports:
      - 3306:3306
    volumes:
      - mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  clickhouse:
    networks:
      - default
    build:
      context: ../../../..
      dockerfile: dev/Dockerfile.clickhouse
    container_name: clickhouse
    environment:
      CLICKHOUSE_ADMIN_USER: default
      CLICKHOUSE_ADMIN_PASSWORD: password
    ports:
      - "8123:8123"
      - "9000:9000"
    volumes:
      - clickhouse:/bitnami/clickhouse
    healthcheck:
      test: [
        "CMD",
        "clickhouse-client",
        "--user=default",
        "--password=password",
        "--query=SELECT 1",
      ]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 10s

  redis:
    networks:
      - default
    container_name: redis
    image: redis:8.0@sha256:ae471bdc20de180beed36e347d170ec0bdf8faa327959ea1f24692f22b05b955
    ports:
      - 6379:6379
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 30
      start_period: 5s

  vault:
    networks:
      - default
    container_name: vault
    image: unkey/vault:dev
    pull_policy: never
    command: ["--config", "/etc/unkey/vault.toml"]
    ports:
      - "8060:8060"
    volumes:
      - ./vault.toml:/etc/unkey/vault.toml:ro
      - vault-data:/var/lib/unkey/vault

  restate:
    networks:
      - default
    container_name: restate
    image: docker.io/restatedev/restate:1.6.0@sha256:33f227db946864b5482340a8621e32ec5eaf464f4dc41d5deccfd3282bb930ae
    ports:
      - "8081:8080"
      - "9070:9070"

  ctrl-api:
    networks:
      - default
    image: unkey/control-api:dev
    pull_policy: never
    container_name: ctrl-api
    command: ["--config", "/etc/unkey/ctrl-api.toml"]
    ports:
      - "7091:7091"
    depends_on:
      mysql:
        condition: service_healthy
      restate:
        condition: service_started
      clickhouse:
        condition: service_healthy
    volumes:
      - ./ctrl-api.toml:/etc/unkey/ctrl-api.toml:ro

  ctrl-worker:
    networks:
      - default
    image: unkey/control-worker:dev
    pull_policy: never
    container_name: ctrl-worker
    command: ["--config", "/etc/unkey/ctrl-worker.toml"]
    ports:
      - "9080:9080"
    depends_on:
      mysql:
        condition: service_healthy
      restate:
        condition: service_started
      clickhouse:
        condition: service_healthy
      vault:
        condition: service_started
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./ctrl-worker.toml:/etc/unkey/ctrl-worker.toml:ro

  api:
    networks:
      - default
    container_name: api
    image: unkey/api:dev
    pull_policy: never
    command: ["--config", "/etc/unkey/api.toml"]
    ports:
      - 7070:7070
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      vault:
        condition: service_started
      ctrl-api:
        condition: service_started
    volumes:
      - ./api.toml:/etc/unkey/api.toml:ro

volumes:
  mysql:
  clickhouse:
  vault-data:

networks:
  default:
