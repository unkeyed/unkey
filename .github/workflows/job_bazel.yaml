name: Bazel
on:
  workflow_call:
permissions:
  contents: read
jobs:
  build:
    name: Build and Test
    runs-on: depot-ubuntu-24.04-8
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4

      - name: Move Depot Bazel Config
        run: |
          if [[ -f "$HOME/.bazelrc" ]]; then
            echo "Found existing bazelrc."
            sudo mv $HOME/.bazelrc /etc/bazel.bazelrc
          fi

      - uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77 # 0.18.0
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: false # we're already using depots remote cache
          # Share repository cache between workflows.
          repository-cache: true

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
        with:
          install: true

      - name: Build
        run: bazel build //...

      - name: Load Docker images
        run: bazel run //:oci_load_unkey

      # Running containers is temporary until we moved them inside of bazel,
      # at that point they are only created if they are actually needed
      - name: Start containers
        run: docker compose -f ./dev/docker-compose.yaml up s3 clickhouse mysql vault -d --wait
      - name: Run tests
        run: bazel test //... --test_output=errors
