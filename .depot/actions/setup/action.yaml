name: Setup Toolchain
description: Install pinned mise tools and configure dependency caches

inputs:
  github_token:
    description: GitHub token for authenticated tool downloads
    required: false

runs:
  using: composite
  steps:
    - name: Cache mise tools
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ~/.local/share/mise
          ~/.cache/mise
        key: mise-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('mise.toml', 'mise.lock') }}
        restore-keys: |
          mise-${{ runner.os }}-${{ runner.arch }}-

    - name: Install mise
      shell: bash
      run: |
        set -euo pipefail

        ./dev/install-mise

        echo "$HOME/.local/bin" >> "$GITHUB_PATH"
        echo "$HOME/.local/share/mise/shims" >> "$GITHUB_PATH"

    - name: Install pinned tools
      shell: bash
      run: |
        mise trust --yes
        mise install --yes --locked
      env:
        GITHUB_TOKEN: ${{ inputs.github_token }}

    - name: Resolve pnpm store
      id: pnpm-store
      shell: bash
      run: echo "path=$(mise exec -- pnpm store path --silent)" >> "$GITHUB_OUTPUT"

    - name: Cache pnpm store
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: ${{ steps.pnpm-store.outputs.path }}
        key: pnpm-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('web/pnpm-lock.yaml') }}
        restore-keys: |
          pnpm-${{ runner.os }}-${{ runner.arch }}-

    - name: Cache Go modules
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
      with:
        path: |
          ~/go/pkg/mod
          ~/.cache/go-build
        key: go-${{ runner.os }}-${{ runner.arch }}-${{ hashFiles('go.sum') }}
        restore-keys: |
          go-${{ runner.os }}-${{ runner.arch }}-
