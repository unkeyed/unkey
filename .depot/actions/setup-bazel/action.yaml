name: Setup Bazel
description: Install Bazel and wire up the shared Depot remote cache.

inputs:
  cache_auth:
    description: Authorization header value for cache.depot.dev. Pass secrets.DEPOT_BAZEL_CACHE_AUTHORIZATION.
    required: true

runs:
  using: composite
  steps:
    - uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77 # 0.18.0
      with:
        bazelisk-cache: true
        disk-cache: false
        repository-cache: true
        bazelrc: |
          common --remote_cache=https://cache.depot.dev
          common --remote_header=authorization=${{ inputs.cache_auth }}
          common --remote_local_fallback
