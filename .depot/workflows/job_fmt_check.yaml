name: Format Check
on:
  workflow_call:
permissions:
  contents: read
jobs:
  format-check:
    name: Format check
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - uses: ./.depot/actions/setup
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
      - name: Install web dependencies
        run: mise run install-web
      - name: Format
        run: mise run fmt
      - name: Check for drift
        run: |
          if ! git diff --exit-code; then
            echo
            echo "Formatting drift detected. Run 'mise run fmt' locally and push again."
            exit 1
          fi
