name: Bazel
on:
  workflow_call:
permissions:
  contents: read
jobs:
  build:
    name: Build and Test
    runs-on: depot-ubuntu-24.04-8
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - uses: bazel-contrib/setup-bazel@083175551ceeceebc757ebee2127fde78840ca77 # 0.18.0
        with:
          # Avoid downloading Bazel every time.
          bazelisk-cache: true
          # Store build cache per workflow.
          disk-cache: false # we're already using depots remote cache
          # Share repository cache between workflows.
          repository-cache: true
          # Remote cache is auto-configured by Depot's runner via $HOME/.bazelrc.
          # Do not set `bazelrc:` here — it would overwrite Depot's injected
          # cache credentials and silently fall back to local builds.
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@e468171a9de216ec08956ac3ada2f0791b6bd435 # v3.11.1
        with:
          install: true
      - name: Build
        run: bazel build //...
      - name: Run tests
        run: bazel test //... --test_output=errors
