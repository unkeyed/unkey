name: autofix.ci
on:
  pull_request:
  push:
    branches: ["main"]
permissions:
  contents: read
jobs:
  detect_changes:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    uses: ./.depot/workflows/job_detect_changes.yaml
  autofix:
    if: github.event.pull_request.draft == false || github.event_name != 'pull_request'
    runs-on: depot-ubuntu-24.04-4
    timeout-minutes: 15
    steps:
      - name: Disable IPv6 (workaround for proxy.golang.org resolution)
        run: |
          sudo sysctl -w net.ipv6.conf.all.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.default.disable_ipv6=1
          sudo sysctl -w net.ipv6.conf.lo.disable_ipv6=1
          echo 'precedence ::ffff:0:0/96 100' | sudo tee -a /etc/gai.conf
          echo 'nameserver 8.8.8.8' | sudo tee /etc/resolv.conf
          echo 'nameserver 8.8.4.4' | sudo tee -a /etc/resolv.conf
      - uses: actions/checkout@08eba0b27e820071cde6df949e0beb9ba4906955 # v4
      - name: Setup Node
        uses: ./.depot/actions/setup-node
      - name: Setup Go
        uses: ./.depot/actions/setup-go
      - name: Install dprint
        run: curl -fsSL https://dprint.dev/install.sh | sh -s 0.51.1 && echo "$HOME/.dprint/bin" >> $GITHUB_PATH
      - name: Format
        run: make fmt
      - uses: autofix-ci/action@635ffb0c9798bd160680f18fd73371e355b85f27 # v1.3.2
